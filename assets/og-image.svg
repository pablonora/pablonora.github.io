  <text x="80" y="300" font-family="'Space Grotesk',Arial,sans-serif" font-size="76" font-weight="700" fill="#ecedf0" letter-spacing="-2">Pablo Nora</text>
  <text x="82" y="360" font-family="'Space Grotesk',Arial,sans-serif" font-size="33" font-weight="500" fill="#45e3a0">Senior Software Engineer · Applied AI Engineer</text>

  <text x="82" y="430" font-family="'JetBrains Mono',monospace" font-size="22" fill="#9aa0ab">10+ yrs · Top US &amp; EU companies · LLM · RAG · Agents · MCP</text>
  <text x="82" y="465" font-family="'JetBrains Mono',monospace" font-size="22" fill="#9aa0ab">TypeScript · Node.js · Distributed Systems · 98+ Core Web Vitals</text>

  <text x="80" y="560" font-family="'JetBrains Mono',monospace" font-size="20" fill="#646b78">pablonora.github.io</text>
