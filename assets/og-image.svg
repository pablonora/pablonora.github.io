  <!-- monogram chip -->
  <g transform="translate(80,86)">
    <rect width="58" height="58" rx="13" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
    <text x="29" y="39" text-anchor="middle" font-family="'Space Grotesk',Arial,sans-serif" font-size="24" font-weight="700" fill="#45e3a0">PN</text>
