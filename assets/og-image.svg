<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Pablo Nora — Senior Software Engineer and Applied AI Engineer">
  <defs>
    <radialGradient id="glow" cx="78%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#45e3a0" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#45e3a0" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#08090c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="100%" stop-color="#08090c"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- neural motif -->
  <g stroke="#45e3a0" stroke-opacity="0.28" stroke-width="1.2">
    <line x1="860" y1="120" x2="980" y2="200"/>
    <line x1="980" y1="200" x2="900" y2="320"/>
    <line x1="900" y1="320" x2="1040" y2="360"/>
    <line x1="980" y1="200" x2="1090" y2="150"/>
    <line x1="860" y1="120" x2="900" y2="320"/>
    <line x1="1040" y1="360" x2="1090" y2="150"/>
    <line x1="900" y1="320" x2="1000" y2="470"/>
    <line x1="1040" y1="360" x2="1000" y2="470"/>
  </g>
  <g fill="#45e3a0">
    <circle cx="860" cy="120" r="6"/>
    <circle cx="980" cy="200" r="8"/>
    <circle cx="900" cy="320" r="6"/>
    <circle cx="1040" cy="360" r="7"/>
    <circle cx="1090" cy="150" r="5"/>
    <circle cx="1000" cy="470" r="6"/>
