<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page not found · Pablo Nora</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <style>
    :root { --bg:#08090c; --ink:#ecedf0; --soft:#9aa0ab; --accent:#e8b84b; }
    * { box-sizing: border-box; }
    body {
      margin:0; min-height:100svh; background:var(--bg); color:var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display:flex; align-items:center; justify-content:center; text-align:center; padding:24px;
    }
    .code { font-size: clamp(4rem, 18vw, 11rem); font-weight:700; letter-spacing:-.04em; line-height:1;
            background: linear-gradient(180deg, #fff, var(--accent)); -webkit-background-clip:text; background-clip:text; color:transparent; }
    h1 { font-size: clamp(1.1rem,3vw,1.6rem); margin:14px 0 6px; font-weight:600; }
    p { color:var(--soft); margin:0 0 28px; }
    a { display:inline-block; padding:13px 24px; border-radius:999px; background:var(--accent); color:var(--bg);
        text-decoration:none; font-weight:600; }
    a:hover { filter:brightness(1.08); }
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>This route doesn’t resolve.</h1>
    <p>The page you’re looking for moved or never existed.</p>
    <a href="/">← Back to home</a>
  </main>
</body>
</html>
